name: CI

on:
  push:
    # 모든 브랜치 푸시에서 검증합니다(피처 브랜치의 큰 구조 변경이 머지 전에 CI를 통과하도록).
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      # 전 모듈 테스트(Konsist 아키텍처 규칙 포함) 실행 + 커버리지 게이트(koverVerify, search-service 최소 92%).
      # test는 모든 모듈로 팬아웃되고, kover 게이트는 search-service에만 적용됩니다.
      - name: Run tests & coverage
        run: ./gradlew test koverVerify koverHtmlReport

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          # 멀티모듈: 각 모듈의 build/reports 아래 리포트를 모두 수집합니다(구조 보존).
          path: '**/build/reports/tests/test'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          # Kover는 search-service에만 적용됩니다.
          path: search-service/build/reports/kover/html
          retention-days: 7
