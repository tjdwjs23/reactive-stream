# Grafana가 시작할 때 이 디렉토리의 대시보드 JSON을 자동으로 불러옵니다.
# 덕분에 UI에서 수동으로 import 하지 않아도 컨테이너 기동과 동시에 그래프가 보입니다.
# (같은 디렉토리의 .json 파일만 대시보드로 취급하고, 이 .yml 은 무시합니다.)
apiVersion: 1

providers:
  - name: hexagonal-dashboards
    orgId: 1
    type: file
    # 코드로 관리하므로 UI에서 지운 대시보드도 재기동 시 되살아납니다.
    disableDeletion: false
    # 파일이 바뀌면 주기적으로 다시 로드합니다(초).
    updateIntervalSeconds: 30
    # UI에서 편집·저장을 허용합니다(파일이 원본이므로 재기동하면 파일 내용으로 복원).
    allowUiUpdates: true
    options:
      # provisioning 디렉토리 통째로 마운트되므로 컨테이너 안에서는 이 경로입니다.
      path: /etc/grafana/provisioning/dashboards
      # 파일 시스템 구조를 Grafana 폴더로 그대로 반영합니다.
      foldersFromFilesStructure: true
