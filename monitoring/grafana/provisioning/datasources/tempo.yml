# Grafana가 시작할 때 Tempo 데이터소스를 자동 등록합니다(분산 트레이스 조회).
apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    # 같은 compose 네트워크 안이므로 서비스 이름(tempo)으로 접근합니다.
    url: http://tempo:3200
    jsonData:
      # 트레이스 → Loki 로그 점프(트레이스의 traceId로 관련 로그를 필터해 보여줌).
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
      # 서비스 그래프/노드의 요청·지연 메트릭은 Prometheus에서 조회합니다.
      serviceMap:
        datasourceUid: prometheus
      # 트레이스 노드에서 관련 메트릭(RED)로 이어지는 링크.
      tracesToMetrics:
        datasourceUid: prometheus
