# Grafana가 시작할 때 이 데이터소스를 자동으로 등록합니다.
# 덕분에 Grafana UI에서 수동으로 데이터소스를 추가할 필요가 없습니다.
# (대시보드 import 시 이 "Prometheus"를 데이터소스로 고르면 바로 그래프가 그려집니다.)
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # 고정 uid — 아래 dashboards/ 의 대시보드 JSON이 이 uid로 데이터소스를 참조합니다.
    uid: prometheus
    access: proxy
    # 같은 compose 네트워크 안이므로 서비스 이름(prometheus)으로 접근합니다.
    url: http://prometheus:9090
    isDefault: true
    editable: true
