# Grafana가 시작할 때 Loki 데이터소스를 자동 등록합니다(구조화 로그 조회).
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    # 같은 compose 네트워크 안이므로 서비스 이름(loki)으로 접근합니다.
    url: http://loki:3100
    jsonData:
      # trace id를 뽑아 Tempo 트레이스로 바로 점프하는 링크를 만듭니다(로그 → 트레이스 상관).
      # 이제 로그는 OTel logback appender → Alloy(otelcol.exporter.loki) → Loki 경로입니다.
      # 이 exporter는 trace/span id를 로그 본문 JSON에 "traceid"/"spanid"(소문자·언더스코어 없음) 필드로 실어 보냅니다
      # (구조화 메타데이터/라벨이 아님 — 실측으로 확인). 따라서 라인 본문을 regex로 매칭합니다.
      derivedFields:
        - name: TraceID
          matcherType: regex
          matcherRegex: '"traceid":"(\w+)"'
          # $$ 로 이스케이프해야 프로비저닝 로드 시가 아니라 조회 시점에 Grafana가 값을 치환합니다.
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "Tempo에서 트레이스 보기"
