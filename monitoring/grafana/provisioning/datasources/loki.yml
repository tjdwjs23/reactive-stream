# Grafana가 시작할 때 Loki 데이터소스를 자동 등록합니다(구조화 로그 조회).
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    # 같은 compose 네트워크 안이므로 서비스 이름(loki)으로 접근합니다.
    url: http://loki:3100
    jsonData:
      # 로그 JSON의 trace id를 뽑아 Tempo 트레이스로 바로 점프하는 링크를 만듭니다(로그 → 트레이스 상관).
      # Micrometer가 MDC에 traceId를 넣고, loki4j의 MdcJsonProvider가 mdc_ 접두어를 붙여 "mdc_traceId"로 실어 보냅니다.
      derivedFields:
        - name: TraceID
          matcherType: regex
          matcherRegex: '"mdc_traceId":"(\w+)"'
          # $$ 로 이스케이프해야 프로비저닝 로드 시가 아니라 조회 시점에 Grafana가 값을 치환합니다.
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "Tempo에서 트레이스 보기"
