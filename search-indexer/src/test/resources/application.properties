# 테스트 전용 오버라이드(search-service와 동일 방침).
# 파일명이 main의 application.yml과 달라(덮어쓰지 않고) 함께 로드되며, properties가 우선합니다.

# 모든 @SpringBootTest를 test 프로필로 띄웁니다 → logback-spring.xml의 <springProfile name="!test">가 걸려
# OTEL appender가 붙지 않습니다(Alloy 없는 테스트에서 연결 시도/경고 없음).
spring.profiles.active=test

# Alloy(OTLP 수집기) 없이도 테스트가 조용히 통과하도록 OTLP push 계열 export를 모두 끕니다.
management.tracing.enabled=false
management.otlp.metrics.export.enabled=false
management.opentelemetry.logging.export.enabled=false
