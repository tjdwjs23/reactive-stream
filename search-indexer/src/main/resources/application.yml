spring:
  application:
    name: search-indexer

  # Kafka 소비. 브로커 주소·그룹 id만 여기 두고, 팩토리/역직렬화/오프셋 등 상세는 KafkaConsumerConfig에서
  # 명시적으로 구성합니다(Boot 4는 spring-kafka만으론 자동 구성이 딸려오지 않음).
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:search-indexer}
    listener:
      # 배치 리스너의 병렬 소비 스레드 수. 실질 병렬성은 토픽 파티션 수로 상한이 걸립니다
      # (파티션 3 + concurrency 3 → 파티션당 스레드 1). 파티션 수는 배포(Helm)의 브로커 설정에서 지정합니다.
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3}

  # 색인 대상 Elasticsearch(Nori). board-service와 동일한 boards 인덱스를 공유하며, 이 서비스가 writer입니다.
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
    # 연결/소켓 타임아웃(무한 대기 차단). ES가 느리면 색인 배치가 매달리지 않고, 색인 어댑터의
    # 서킷브레이커가 반복 실패 시 열려 빠르게 실패합니다(→ DefaultErrorHandler 재시도 후 DLQ 격리).
    connection-timeout: ${SPRING_ELASTICSEARCH_CONNECTION_TIMEOUT:1s}
    socket-timeout: ${SPRING_ELASTICSEARCH_SOCKET_TIMEOUT:5s}

# 공개 비즈니스 API는 없지만(순수 컨슈머), k8s liveness/readiness가 /actuator/health를 HTTP로 확인해야 하므로
# 경량 WebFlux/Netty 서버를 8081에 띄웁니다(메인=관리 포트 동일).
server:
  port: 8081

# 로그: board-service와 동일하게 콘솔을 구조화 JSON(ECS)으로 출력하고(trace/span id 포함), OTel appender로 OTLP push.
logging:
  structured:
    format:
      console: ecs

# 관측성: board-service와 동일한 OTLP 파이프라인으로 metrics/logs/traces를 단일 수집기 Grafana Alloy(:4318)에 push.
# service.name은 spring.application.name(=search-indexer)이라 board-service와 Grafana/Tempo/Mimir에서 구분됩니다.
# (service.namespace는 board-service와 동일한 이유로 두지 않습니다 — 상관 키를 raw service.name으로 통일.)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  opentelemetry:
    resource-attributes:
      deployment.environment: ${DEPLOYMENT_ENV:local}
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
          transport: http
    logging:
      export:
        otlp:
          endpoint: ${OTLP_LOGS_ENDPOINT:http://localhost:4318/v1/logs}
          transport: http
  otlp:
    metrics:
      export:
        url: ${OTLP_METRICS_URL:http://localhost:4318/v1/metrics}
