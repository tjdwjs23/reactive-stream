# 테스트 전용 오버라이드.
# 파일명이 main의 application.yml과 달라(덮어쓰지 않고) 함께 로드되며, properties가 우선합니다.
# 따라서 main의 r2dbc/redis/es 등 설정은 그대로 상속하고 아래 키만 덮어씁니다.

# 모든 @SpringBootTest를 test 프로필로 띄웁니다.
# → logback-spring.xml의 <springProfile name="!test">가 걸려 Loki appender가 붙지 않습니다.
spring.profiles.active=test

# Alloy(및 LGTM) 인프라 없이도 테스트가 조용히 통과하도록 push 계열 export를 모두 끕니다.
# management.tracing.enabled=false 면 Tracer/exporter 자체가 구성되지 않아 OTLP 트레이스 연결 시도/경고가 없습니다.
management.tracing.enabled=false
# OTLP 메트릭 push(→Alloy)도 테스트에선 끕니다. /actuator/prometheus(Micrometer prometheus 레지스트리)는 그대로 노출됩니다.
management.otlp.metrics.export.enabled=false
# OTLP 로그 push(→Alloy)도 테스트에선 끕니다. logback-spring.xml의 !test 프로필이 OTEL appender도 떼므로 이중 안전장치입니다.
management.opentelemetry.logging.export.enabled=false
