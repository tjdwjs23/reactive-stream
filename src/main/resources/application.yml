spring:
  application:
    name: hexagonal-back

  # 애플리케이션 런타임 DB 접근은 R2DBC(논블로킹)로 수행합니다.
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/hexagonal
    username: hexagonal
    password: hexagonal1234

  # Flyway는 R2DBC를 지원하지 않으므로 마이그레이션 전용 JDBC 접속 정보를 별도로 둡니다.
  # (spring.flyway.url이 설정되면 Flyway가 자체 JDBC 데이터소스로 마이그레이션을 수행합니다.)
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/hexagonal
    user: hexagonal
    password: hexagonal1234
    locations: classpath:db/migration

# 오래된 게시글 일괄 아카이브 배치 설정 (murray의 jobParameters에 해당하는 튜닝 노브)
board:
  archiving:
    enabled: false            # 운영에서 켤 때만 true
    cron: "0 0 4 * * *"       # 매일 04:00
    retention-days: 365       # 365일 지난 게시글이 대상
    chunk-size: 500           # 한 번에 삭제할 청크 크기 = 스트리밍 페이지 크기
    concurrency: 4            # 동시 처리 워커 수 = 바운드 채널 용량(백프레셔 상한)
