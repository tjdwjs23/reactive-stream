spring:
  application:
    name: reactive

  # @Scheduled 작업 실행 스레드 풀. 기본값은 1이라 아카이브 배치(장시간)와 조회수 플러시(30초 주기)가
  # 한 스레드를 두고 경합해, 긴 배치가 도는 동안 플러시가 통째로 밀립니다. 두 스케줄이 서로를 막지 않도록 2로 둡니다.
  task:
    scheduling:
      pool:
        size: 2

  # 애플리케이션 DB 접근은 전 구간 R2DBC(논블로킹)로만 수행합니다. JDBC는 사용하지 않습니다.
  # 스키마 초기화는 Flyway가 아니라 R2DBC ConnectionFactoryInitializer(R2dbcSchemaInitializer)가
  # 기동 시 db/schema.sql을 실행하는 방식으로 처리합니다.
  # 접속 정보는 환경변수로 외부화합니다(운영은 Vault/K8s Secret로 주입, 로컬은 아래 기본값 사용).
  # 비밀번호를 소스에 평문으로 커밋하지 않기 위해 ${ENV:default} 형태를 씁니다.
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/reactive}
    username: ${SPRING_R2DBC_USERNAME:reactive}
    password: ${SPRING_R2DBC_PASSWORD:reactive1234}

  # 조회수 카운터용 Redis(리액티브 Lettuce). 조회 시 INCR로 델타를 쌓고, 주기적으로 DB에 write-back합니다.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # 한글 전문검색용 Elasticsearch(Nori). WebFlux 클래스패스에서 리액티브 클라이언트가 자동 구성됩니다.
  # docker-compose의 elasticsearch(보안 비활성화)에 맞춰 http로 접속합니다.
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

# 로그: 콘솔/stdout을 구조화 JSON(ECS)으로 출력합니다(Spring Boot 4 네이티브 구조화 로깅, 추가 의존성 없음).
# Micrometer Tracing이 MDC에 넣는 trace.id/span.id가 ECS 필드로 함께 실려 로그↔트레이스 상관이 가능합니다.
# (Loki push는 test 프로필에서 꺼지도록 logback-spring.xml에서 게이트합니다. 콘솔 JSON은 모든 환경 공통.)
logging:
  structured:
    format:
      console: ecs

# 관측성(LGTM 스택). 메트릭·로그·트레이스를 모두 push 방식으로 내보내 Grafana 단일 대시보드에서 봅니다.
# - /actuator/health : 애플리케이션/의존성 상태(r2dbc/redis/es 헬스 포함)
# - /actuator/metrics, /actuator/prometheus : 로컬 디버깅용 Micrometer 메트릭 노출(스크레이프는 하지 않음)
# - metrics : OTLP로 Mimir에 push (Prometheus 서버 없이 Mimir가 저장/조회 담당 — Mimir는 스스로 긁지 않음)
# - tracing : Micrometer Tracing이 요청마다 trace/span을 만들고 OTLP로 Tempo에 export.
#   Reactor↔코루틴 컨텍스트 전파는 ObservabilityConfig가 켜 둠(suspend/Flow 경계 넘어 traceId 유지).
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      # 로컬/개발은 전량 샘플링. 운영은 MANAGEMENT_TRACING_SAMPLING_PROBABILITY로 낮춰 오버헤드를 제어합니다.
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  # Spring Boot 4에서 OTLP 트레이싱 export 설정은 management.opentelemetry.tracing.export.otlp.* 로 이동했습니다
  # (Boot 3.x의 management.otlp.tracing.endpoint 아님). Tempo의 OTLP/HTTP 수신(4318)으로 push합니다.
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
          transport: http
  # 메트릭 OTLP export(Micrometer OTLP 레지스트리). Mimir의 OTLP 수신 엔드포인트(/otlp/v1/metrics)로 push합니다.
  # 앱은 호스트, Mimir는 docker(9009 노출)라 localhost로 push합니다. (트레이싱 OTLP는 위 management.opentelemetry.*,
  # 메트릭 OTLP는 여기 management.otlp.metrics.export.* — Boot 4의 네임스페이스가 서로 다릅니다.)
  otlp:
    metrics:
      export:
        url: ${OTLP_METRICS_URL:http://localhost:9009/otlp/v1/metrics}
        # Mimir는 누적(cumulative) 시계열을 기대하므로 Micrometer 기본값(CUMULATIVE)을 그대로 씁니다.

# 오래된 게시글 일괄 아카이브 배치 설정

board:
  # 인증/인가(자체 발급 JWT + 관리자 부트스트랩).
  security:
    jwt:
      # HS256 서명용 대칭키(≥32byte). 비우면 개발용 고정 기본값 + 기동 경고. 운영은 반드시 BOARD_JWT_SECRET 주입.
      secret: ${BOARD_JWT_SECRET:}
      access-token-ttl-minutes: ${BOARD_JWT_TTL_MINUTES:60}
    admin:
      # 기동 시 ROLE_ADMIN 계정을 부트스트랩합니다(가입 API는 ROLE_USER만 생성).
      # password가 비어 있으면 부트스트랩을 건너뛰고 경고합니다. 운영은 BOARD_ADMIN_PASSWORD 주입.
      username: ${BOARD_ADMIN_USERNAME:admin}
      password: ${BOARD_ADMIN_PASSWORD:}

  archiving:
    enabled: false            # 운영에서 켤 때만 true
    cron: "0 0 4 * * *"       # 매일 04:00
    retention-days: 365       # 365일 지난 게시글이 대상
    chunk-size: 500           # 한 번에 삭제할 청크 크기 = 스트리밍 페이지 크기
    concurrency: 4            # 동시 처리 워커 수 = 바운드 채널 용량(백프레셔 상한)

  # 조회수 write-back 플러시: Redis에 쌓인 델타를 주기적으로 DB에 반영
  view-count:
    flush-enabled: true       # 끄면 스케줄 플러시를 건너뜀(델타는 Redis에 계속 누적)
    flush-interval-ms: 30000  # 플러시 주기(ms). 짧을수록 DB 정합성↑, 쓰기 부하↑
    flush-chunk-size: 1000    # 한 번의 배치 UPDATE에 묶을 게시글 수(DB 왕복 = ceil(N/chunk))
    flush-lock-ttl-ms: 300000 # 분산 플러시 락 TTL(ms). 홀더가 죽어도 이 시간 뒤 자동 해제. 최대 플러시 소요보다 넉넉히
    increment-timeout-ms: 200 # 조회 시 Redis 조회수 증가에 허용하는 시간 예산. 초과/실패 시 DB 값으로 강등 응답
