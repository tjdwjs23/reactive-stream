{{- if .Values.observability.enabled }}
# 데이터소스 프로비저닝(Mimir/Loki/Tempo) — 서비스 DNS로 참조하므로 compose 설정 그대로 재사용됩니다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: grafana
    app.kubernetes.io/part-of: board-platform
data:
{{ (.Files.Glob "files/grafana/datasources/*.yml").AsConfig | indent 2 }}
---
# 대시보드 프로비저닝(provider yml + 대시보드 JSON)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  labels:
    app: grafana
    app.kubernetes.io/part-of: board-platform
data:
{{ (.Files.Glob "files/grafana/dashboards/*").AsConfig | indent 2 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
    app.kubernetes.io/part-of: board-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/part-of: board-platform
    spec:
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.observability.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.observability.grafana.adminPassword | quote }}
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app: grafana
    app.kubernetes.io/part-of: board-platform
spec:
  # kind 매핑(30030→host 3000)으로 http://localhost:3000 접근
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: {{ .Values.observability.grafana.nodePort }}
{{- end }}
