apiVersion: apps/v1
kind: Deployment
metadata:
  name: board-service
  labels:
    app: board-service
    app.kubernetes.io/part-of: board-platform
spec:
  replicas: {{ .Values.boardService.replicas }}
  selector:
    matchLabels:
      app: board-service
  template:
    metadata:
      labels:
        app: board-service
        app.kubernetes.io/part-of: board-platform
    spec:
      # 스키마 초기화(R2dbcSchemaInitializer)가 기동 시 DB를 필요로 하므로 postgres 준비를 기다립니다.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["/bin/sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: board-service
          image: {{ .Values.boardService.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.boardService.port }}
          env:
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://postgres:5432/{{ .Values.postgres.db }}"
            - name: SPRING_R2DBC_USERNAME
              value: {{ .Values.postgres.user | quote }}
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: board-platform-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_ELASTICSEARCH_URIS
              value: "http://elasticsearch:9200"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            # 로컬 k8s에서는 아웃박스 릴레이를 켜 이벤트가 실제로 흐르게 합니다.
            - name: BOARD_OUTBOX_RELAY_ENABLED
              value: "true"
            - name: BOARD_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: board-platform-secrets
                  key: BOARD_JWT_SECRET
            - name: BOARD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: board-platform-secrets
                  key: BOARD_ADMIN_PASSWORD
            {{- include "board-platform.observabilityEnv" . | nindent 12 }}
          # readiness는 의존성(r2dbc/redis/es) 준비까지 기다립니다. liveness는 프로세스 생존만 봅니다
          # (의존성 장애로 인한 재시작 루프 방지).
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.boardService.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: {{ .Values.boardService.port }}
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 6
          resources:
            {{- toYaml .Values.boardService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: board-service
  labels:
    app: board-service
    app.kubernetes.io/part-of: board-platform
spec:
  # kind extraPortMapping(nodePort → host 8080)으로 호스트에서 바로 접근합니다.
  type: NodePort
  selector:
    app: board-service
  ports:
    - port: {{ .Values.boardService.port }}
      targetPort: {{ .Values.boardService.port }}
      nodePort: {{ .Values.boardService.nodePort }}
