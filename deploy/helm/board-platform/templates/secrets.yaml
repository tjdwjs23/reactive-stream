apiVersion: v1
kind: Secret
metadata:
  name: board-platform-secrets
  labels:
    app.kubernetes.io/part-of: board-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  BOARD_JWT_SECRET: {{ .Values.security.jwtSecret | quote }}
  BOARD_ADMIN_PASSWORD: {{ .Values.security.adminPassword | quote }}
