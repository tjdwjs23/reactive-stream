apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-indexer
  labels:
    app: search-indexer
    app.kubernetes.io/part-of: search-platform
spec:
  replicas: {{ .Values.searchIndexer.replicas }}
  selector:
    matchLabels:
      app: search-indexer
  template:
    metadata:
      labels:
        app: search-indexer
        app.kubernetes.io/part-of: search-platform
    spec:
      # 컨슈머는 Kafka/ES가 없어도 기동은 되지만(리스너 재접속·색인 best-effort), 시작 로그 소음을 줄이려 준비를 기다립니다.
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["/bin/sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done"]
        - name: wait-for-elasticsearch
          image: busybox:1.36
          command: ["/bin/sh", "-c", "until nc -z elasticsearch 9200; do echo waiting for elasticsearch; sleep 2; done"]
      containers:
        - name: search-indexer
          image: {{ .Values.searchIndexer.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.searchIndexer.port }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: KAFKA_CONSUMER_GROUP_ID
              value: "search-indexer"
            - name: SPRING_ELASTICSEARCH_URIS
              value: "http://elasticsearch:9200"
            {{- include "search-platform.observabilityEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.searchIndexer.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: {{ .Values.searchIndexer.port }}
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 6
          resources:
            {{- toYaml .Values.searchIndexer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: search-indexer
  labels:
    app: search-indexer
    app.kubernetes.io/part-of: search-platform
spec:
  # actuator/health를 호스트에서 확인할 수 있게 NodePort로 노출(선택).
  type: NodePort
  selector:
    app: search-indexer
  ports:
    - port: {{ .Values.searchIndexer.port }}
      targetPort: {{ .Values.searchIndexer.port }}
      nodePort: {{ .Values.searchIndexer.nodePort }}
