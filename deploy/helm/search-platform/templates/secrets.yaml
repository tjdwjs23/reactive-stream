apiVersion: v1
kind: Secret
metadata:
  name: search-platform-secrets
  labels:
    app.kubernetes.io/part-of: search-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  SEARCH_JWT_SECRET: {{ .Values.security.jwtSecret | quote }}
  SEARCH_ADMIN_PASSWORD: {{ .Values.security.adminPassword | quote }}
  # Grafana Cloud OTLP Basic auth(포털 OpenTelemetry 타일에서 발급). 기본 빈 값 — 배포 시 --set으로 주입, 커밋 금지.
  GRAFANA_CLOUD_INSTANCE_ID: {{ .Values.observability.grafanaCloud.instanceId | quote }}
  GRAFANA_CLOUD_API_TOKEN: {{ .Values.observability.grafanaCloud.apiToken | quote }}
