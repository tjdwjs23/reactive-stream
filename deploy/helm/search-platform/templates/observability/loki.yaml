{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels:
    app: loki
    app.kubernetes.io/part-of: search-platform
data:
  loki-config.yml: |
{{ .Files.Get "files/loki/loki-config.yml" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    app: loki
    app.kubernetes.io/part-of: search-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
        app.kubernetes.io/part-of: search-platform
    spec:
      containers:
        - name: loki
          image: {{ .Values.observability.loki.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config.file=/etc/loki/loki-config.yml"]
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    app: loki
    app.kubernetes.io/part-of: search-platform
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
{{- end }}
