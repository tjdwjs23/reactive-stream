{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  labels:
    app: alloy
    app.kubernetes.io/part-of: search-platform
data:
  config.alloy: |
{{ .Files.Get "files/alloy/config.alloy" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  labels:
    app: alloy
    app.kubernetes.io/part-of: search-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
        app.kubernetes.io/part-of: search-platform
      annotations:
        # config.alloy가 바뀌면 파드를 롤아웃해 새 설정을 반영한다.
        checksum/config: {{ .Files.Get "files/alloy/config.alloy" | sha256sum }}
    spec:
      containers:
        - name: alloy
          image: {{ .Values.observability.alloy.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
          env:
            # Grafana Cloud OTLP 게이트웨이(.../otlp) — 평문(values). config.alloy가 sys.env로 읽는다.
            - name: GRAFANA_CLOUD_OTLP_ENDPOINT
              value: {{ .Values.observability.grafanaCloud.otlpEndpoint | quote }}
            # Basic auth 자격증명 — Secret에서 주입(레포에 커밋하지 않음).
            - name: GRAFANA_CLOUD_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: search-platform-secrets
                  key: GRAFANA_CLOUD_INSTANCE_ID
            - name: GRAFANA_CLOUD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: search-platform-secrets
                  key: GRAFANA_CLOUD_API_TOKEN
          ports:
            - containerPort: 4317 # OTLP gRPC (앱 push)
            - containerPort: 4318 # OTLP HTTP (앱 push)
            - containerPort: 12345 # 디버그 UI
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  labels:
    app: alloy
    app.kubernetes.io/part-of: search-platform
spec:
  selector:
    app: alloy
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
{{- end }}
