{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  labels:
    app: tempo
    app.kubernetes.io/part-of: search-platform
data:
  tempo.yml: |
{{ .Files.Get "files/tempo/tempo.yml" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  labels:
    app: tempo
    app.kubernetes.io/part-of: search-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
        app.kubernetes.io/part-of: search-platform
    spec:
      containers:
        - name: tempo
          image: {{ .Values.observability.tempo.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config.file=/etc/tempo/tempo.yml"]
          ports:
            - containerPort: 3200 # 조회 API(Grafana)
            - containerPort: 4317 # OTLP gRPC 수신(Alloy → tempo)
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  labels:
    app: tempo
    app.kubernetes.io/part-of: search-platform
spec:
  selector:
    app: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
{{- end }}
