# 로컬 개발용 Loki(단일 바이너리) 최소 설정.
# 인증 없음, 파일시스템 스토리지, 단일 노드. 운영용 아님(운영은 객체 스토리지 + 다중 노드).
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Alloy(otelcol.exporter.loki)가 OTel 로그를 변환해 실어 보내는 구조화 메타데이터를 허용합니다.
  allow_structured_metadata: true
  # 로컬에서 과거/미래 타임스탬프 로그도 넉넉히 받아들입니다.
  reject_old_samples: false
