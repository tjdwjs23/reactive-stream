# kind 단일 노드 클러스터. search-service를 호스트에서 바로 열 수 있게 NodePort(30080)를 host 8080으로 매핑합니다.
#   kind create cluster --name search-platform --config deploy/kind/kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: search-platform
nodes:
  - role: control-plane
    extraPortMappings:
      # search-service Service(type: NodePort, nodePort 30080) → 호스트 localhost:8080
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # search-indexer actuator(선택) NodePort 30081 → 호스트 localhost:8081
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
      # Grafana(observability.enabled=true일 때) NodePort 30030 → 호스트 localhost:3000
      - containerPort: 30030
        hostPort: 3000
        protocol: TCP
