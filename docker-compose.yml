# 로컬 개발용 통합 스택: PostgreSQL + Redis + Elasticsearch + Alloy + LGTM(Loki + Grafana + Tempo + Mimir)
#
# Spring 앱(8080)은 이 compose에 포함하지 않습니다.
#   - 앱은 호스트에서 ./gradlew bootRun 으로 실행합니다.
#   - 앱은 metrics/logs/traces를 모두 OTLP로 단일 수집기 Grafana Alloy(4318/HTTP·4317/gRPC)에 push합니다.
#   - Alloy가 이를 Mimir(metrics)·Loki(logs)·Tempo(traces)로 팬아웃합니다(monitoring/alloy/config.alloy).
#     즉 앱은 백엔드를 몰라도 되고, 수집 파이프라인이 Alloy 한 곳으로 통합됩니다.
#   - Mimir는 Prometheus와 달리 스스로 스크레이프하지 않는 저장소이므로, 메트릭도 OTLP push로 수집합니다.
#
# 사용법:
#   docker compose up -d        # 8개 컨테이너 백그라운드 실행
#   docker compose ps           # 상태 확인
#   docker compose down         # 정지 + 컨테이너 삭제(볼륨/데이터는 유지)
#   docker compose down -v      # 볼륨까지 삭제(완전 초기화)
#
# 접속:
#   PostgreSQL     localhost:5432  (db/user=reactive, pw=reactive1234)
#   Redis          localhost:6379
#   Elasticsearch  http://localhost:9200  (ES 9.2.x, 보안 비활성화, 단일 노드, Nori 플러그인 포함)
#   Kafka          localhost:9092  (KRaft 단일 노드, board-changed 토픽 — Outbox 릴레이 → search-indexer)
#   Grafana        http://localhost:3000  (admin / admin) — 메트릭·로그·트레이스 3종 데이터소스 자동 등록
#   Alloy          OTLP 수신 4318(HTTP)·4317(gRPC) — 앱이 여기로 push / 디버그 UI http://localhost:12345
#   Mimir          http://localhost:9009  (메트릭 저장/조회, Alloy가 OTLP로 전달)
#   Loki           http://localhost:3100  (로그 저장/조회, Alloy가 전달)
#   Tempo          http://localhost:3200  (트레이스 조회) — OTLP 수신은 내부망에서 Alloy로부터만

services:
  postgres:
    image: postgres:16
    container_name: reactive-postgres
    environment:
      POSTGRES_DB: reactive
      POSTGRES_USER: reactive
      POSTGRES_PASSWORD: reactive1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactive -d reactive"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reactive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    # 공식 이미지 + Nori(analysis-nori) 플러그인을 구운 커스텀 이미지를 빌드해서 사용합니다.
    # (한글 형태소 분석/전문검색을 위해 Nori가 필수) — docker/elasticsearch/Dockerfile 참고
    build:
      context: ./docker/elasticsearch
    # 버전은 Spring Boot 4의 ES 클라이언트(9.2.x)와 맞춥니다(ES 8은 프로토콜 비호환).
    image: reactive-elasticsearch-nori:9.2.2
    container_name: reactive-elasticsearch
    environment:
      # 단일 노드 개발 모드 + 로컬 편의를 위해 보안/HTTPS 비활성화
      discovery.type: single-node
      xpack.security.enabled: "false"
      # 로컬 리소스 절약용 힙 크기(운영에서는 절대 이렇게 낮게 두지 말 것)
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    # 이벤트 브로커(KRaft 단일 노드 — Zookeeper 불필요). board-service의 Outbox 릴레이가 board-changed 토픽으로
    # 게시글 변경 이벤트를 발행하고, search-indexer가 소비해 ES 색인을 갱신합니다.
    # 호스트에서 bootRun으로 뜨는 앱이 localhost:9092로 붙도록 advertised listener를 localhost로 둡니다.
    image: apache/kafka:3.9.0
    container_name: reactive-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # 단일 노드라 복제 계수/ISR을 1로. board-changed 토픽은 첫 발행 시 자동 생성됩니다.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mimir:
    # Prometheus 호환 메트릭 저장소(단일 프로세스 모놀리식). Prometheus 서버를 대체합니다.
    # 스스로 스크레이프하지 않고, Alloy가 OTLP(/otlp/v1/metrics)로 전달한 메트릭을 저장합니다.
    # 조회는 Prometheus 호환 API(/prometheus)로 제공되어 Grafana가 PromQL로 그대로 씁니다.
    image: grafana/mimir:2.14.3
    container_name: reactive-mimir
    command: -config.file=/etc/mimir/mimir.yml
    ports:
      - "9009:9009"
    volumes:
      - ./monitoring/mimir/mimir.yml:/etc/mimir/mimir.yml:ro
      - mimir-data:/data

  grafana:
    image: grafana/grafana:latest
    container_name: reactive-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      # 메트릭(Mimir)·로그(Loki)·트레이스(Tempo) 데이터소스를 자동 등록 — provisioning 참고
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - mimir
      - loki
      - tempo

  loki:
    image: grafana/loki:3.3.2
    container_name: reactive-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.7.1
    container_name: reactive-tempo
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"   # Tempo 조회 API(Grafana가 사용)
      # OTLP 수신(4317/4318)은 호스트로 노출하지 않습니다 — 이제 Alloy가 그 포트를 소유하고,
      # Tempo로는 내부 compose 네트워크에서 Alloy가 트레이스를 전달합니다.
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo

  alloy:
    # 단일 OTLP 수집기. 앱이 push한 metrics/logs/traces를 받아 Mimir/Loki/Tempo로 팬아웃합니다.
    image: grafana/alloy:v1.5.1
    container_name: reactive-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "4317:4317"    # OTLP/gRPC 수신(호스트의 앱이 push)
      - "4318:4318"    # OTLP/HTTP 수신(호스트의 앱이 push)
      - "12345:12345"  # Alloy 디버그 UI
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - mimir
      - loki
      - tempo

volumes:
  postgres-data:
  elasticsearch-data:
  mimir-data:
  grafana-data:
  loki-data:
  tempo-data:
  alloy-data:
