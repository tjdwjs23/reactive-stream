# 로컬 개발용 통합 스택: PostgreSQL + Redis + Prometheus + Grafana
#
# Spring 앱(8080)은 이 compose에 포함하지 않습니다.
#   - 앱은 호스트에서 ./gradlew bootRun 으로 실행합니다.
#   - 도커 안의 Prometheus는 host.docker.internal:8080 으로 호스트의 앱을 긁어(scrape)갑니다.
#
# 사용법:
#   docker compose up -d        # 4개 컨테이너 백그라운드 실행
#   docker compose ps           # 상태 확인
#   docker compose down         # 정지 + 컨테이너 삭제(볼륨/데이터는 유지)
#   docker compose down -v      # 볼륨까지 삭제(완전 초기화)
#
# 접속:
#   PostgreSQL  localhost:5432  (db/user=hexagonal, pw=hexagonal1234)
#   Redis       localhost:6379
#   Prometheus  http://localhost:9090
#   Grafana     http://localhost:3000  (admin / admin)

services:
  postgres:
    image: postgres:16
    container_name: hexagonal-postgres
    environment:
      POSTGRES_DB: hexagonal
      POSTGRES_USER: hexagonal
      POSTGRES_PASSWORD: hexagonal1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexagonal -d hexagonal"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hexagonal-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: hexagonal-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # 리눅스에서도 host.docker.internal 이 호스트를 가리키도록 매핑(맥/윈도우는 기본 지원).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: hexagonal-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      # 프로메테우스 데이터소스를 자동 등록(수동 설정 불필요) — 아래 provisioning 파일 참고
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
