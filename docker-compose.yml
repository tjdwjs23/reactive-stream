# 로컬 개발용 인프라 스택 (IntelliJ bootRun 병행용)
#
# 앱(search-service:8080 / search-indexer:8081)은 이 compose에 넣지 않습니다.
#   - 앱은 IntelliJ 또는 ./gradlew :search-service:bootRun 으로 "호스트에서" 실행합니다.
#   - 따라서 모든 데이터스토어를 호스트 포트로 노출하고, 앱은 application.yml 기본값(localhost:*)으로 붙습니다.
#     (postgres localhost:5432 / redis 6379 / elasticsearch 9200 / kafka 9092)
#
# 사용법:
#   docker compose up -d                 # 코어 4종(postgres+redis+elasticsearch+kafka) — 앱 테스트에 필요한 최소셋
#   docker compose --profile obs up -d   # + 관측성 LGTM(Alloy/Mimir/Loki/Tempo/Grafana)
#   docker compose ps                    # 상태 확인
#   docker compose down                  # 정지+삭제(볼륨/데이터 유지)
#   docker compose down -v               # 볼륨까지 삭제(완전 초기화 — DB/ES/Kafka 리셋)
#
# 접속:
#   PostgreSQL     localhost:5432        (db/user=search, pw=search1234)  ← application.yml 기본값과 일치
#   Redis          localhost:6379
#   Elasticsearch  http://localhost:9200 (ES 9.2.x, 보안 비활성화, 단일 노드, Nori 플러그인 포함)
#   Kafka          localhost:9092        (KRaft 단일 노드, 토픽 자동생성 on → board-changed[-dlq] 자동)
#   Grafana        http://localhost:3000 (admin/admin, --profile obs)
#   Alloy          OTLP 수신 4318(HTTP)·4317(gRPC), 디버그 UI :12345 (--profile obs)
#
# 참고: obs 프로파일 없이 앱만 띄우면 앱이 OTLP를 localhost:4318로 push하려다 "connection refused" 경고를
#       주기적으로 남깁니다(무해, 기능엔 영향 없음). 없애려면 IntelliJ 실행 구성의 환경변수에 아래를 추가하거나
#       `--profile obs`로 Alloy를 함께 띄우세요:
#         MANAGEMENT_TRACING_ENABLED=false
#         MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
#         MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_ENABLED=false

services:
  # ─────────────────────────── 코어 데이터스토어 (항상 실행) ───────────────────────────
  postgres:
    image: postgres:16
    container_name: search-postgres
    environment:
      POSTGRES_DB: search
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search -d search"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: search-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    # 공식 이미지 + Nori(analysis-nori) + ICU(analysis-icu)를 구운 커스텀 이미지를 빌드해서 씁니다.
    #   - Nori: 한글 형태소 전문검색(게시글/상품).  - ICU: 상품 초성 자동완성(name.chosung, icu_normalizer).
    # docker/elasticsearch/Dockerfile 참고. 버전은 Spring Boot 4의 ES 클라이언트(9.2.x)와 맞춥니다(ES 8 비호환).
    # ※ 초성 검색을 쓰려면 ICU가 포함된 이 이미지로 재빌드해야 합니다: docker compose build elasticsearch (또는 up --build).
    build:
      context: ./docker/elasticsearch
    image: search-elasticsearch-nori:9.2.2
    container_name: search-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m" # 로컬 절약용(운영에선 이렇게 낮게 두지 말 것)
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    # Apache Kafka(KRaft 모드, ZooKeeper 없음) 단일 노드. Transactional Outbox → board-changed → search-indexer.
    image: apache/kafka:3.9.0
    container_name: search-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      # 앱이 "호스트에서" localhost:9092로 붙으므로 그렇게 advertise 합니다(컨테이너 내부에선 컨트롤러만 9093 사용).
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      # 단일 노드라 복제 계수는 모두 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      # 프로듀서/컨슈머가 board-changed(+ -dlq) 토픽을 자동 생성하도록 허용(로컬 편의).
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────── 관측성 LGTM (docker compose --profile obs) ───────────────────────
  # 설정은 Helm 차트로 이관된 정본(deploy/helm/search-platform/files/)을 그대로 재사용합니다(서비스명이 동일).
  mimir:
    image: grafana/mimir:2.14.3
    container_name: search-mimir
    profiles: ["obs"]
    command: -config.file=/etc/mimir/mimir.yml
    ports:
      - "9009:9009"
    volumes:
      - ./deploy/helm/search-platform/files/mimir/mimir.yml:/etc/mimir/mimir.yml:ro
      - mimir-data:/data

  loki:
    image: grafana/loki:3.3.2
    container_name: search-loki
    profiles: ["obs"]
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/helm/search-platform/files/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.7.1
    container_name: search-tempo
    profiles: ["obs"]
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
    volumes:
      - ./deploy/helm/search-platform/files/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo

  alloy:
    # 단일 OTLP 수집기. 호스트의 앱이 localhost:4318로 push → Alloy가 Mimir/Loki/Tempo로 팬아웃.
    image: grafana/alloy:v1.5.1
    container_name: search-alloy
    profiles: ["obs"]
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    volumes:
      - ./deploy/helm/search-platform/files/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - mimir
      - loki
      - tempo

  grafana:
    image: grafana/grafana:11.4.0
    container_name: search-grafana
    profiles: ["obs"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      # 데이터소스(Mimir/Loki/Tempo)와 대시보드를 provisioning으로 자동 등록.
      - ./deploy/helm/search-platform/files/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/helm/search-platform/files/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - mimir
      - loki
      - tempo

volumes:
  postgres-data:
  elasticsearch-data:
  mimir-data:
  grafana-data:
  loki-data:
  tempo-data:
  alloy-data:
