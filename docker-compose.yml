# 로컬 개발용 통합 스택: PostgreSQL + Redis + Elasticsearch + Prometheus + Grafana
#
# Spring 앱(8080)은 이 compose에 포함하지 않습니다.
#   - 앱은 호스트에서 ./gradlew bootRun 으로 실행합니다.
#   - 도커 안의 Prometheus는 host.docker.internal:8080 으로 호스트의 앱을 긁어(scrape)갑니다.
#
# 사용법:
#   docker compose up -d        # 5개 컨테이너 백그라운드 실행
#   docker compose ps           # 상태 확인
#   docker compose down         # 정지 + 컨테이너 삭제(볼륨/데이터는 유지)
#   docker compose down -v      # 볼륨까지 삭제(완전 초기화)
#
# 접속:
#   PostgreSQL     localhost:5432  (db/user=reactive, pw=reactive1234)
#   Redis          localhost:6379
#   Elasticsearch  http://localhost:9200  (ES 9.2.x, 보안 비활성화, 단일 노드, Nori 플러그인 포함)
#   Prometheus     http://localhost:9090
#   Grafana        http://localhost:3000  (admin / admin)

services:
  postgres:
    image: postgres:16
    container_name: reactive-postgres
    environment:
      POSTGRES_DB: reactive
      POSTGRES_USER: reactive
      POSTGRES_PASSWORD: reactive1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reactive -d reactive"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reactive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    # 공식 이미지 + Nori(analysis-nori) 플러그인을 구운 커스텀 이미지를 빌드해서 사용합니다.
    # (한글 형태소 분석/전문검색을 위해 Nori가 필수) — docker/elasticsearch/Dockerfile 참고
    build:
      context: ./docker/elasticsearch
    # 버전은 Spring Boot 4의 ES 클라이언트(9.2.x)와 맞춥니다(ES 8은 프로토콜 비호환).
    image: reactive-elasticsearch-nori:9.2.2
    container_name: reactive-elasticsearch
    environment:
      # 단일 노드 개발 모드 + 로컬 편의를 위해 보안/HTTPS 비활성화
      discovery.type: single-node
      xpack.security.enabled: "false"
      # 로컬 리소스 절약용 힙 크기(운영에서는 절대 이렇게 낮게 두지 말 것)
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    container_name: reactive-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # 리눅스에서도 host.docker.internal 이 호스트를 가리키도록 매핑(맥/윈도우는 기본 지원).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: reactive-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      # 프로메테우스 데이터소스를 자동 등록(수동 설정 불필요) — 아래 provisioning 파일 참고
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
